name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
