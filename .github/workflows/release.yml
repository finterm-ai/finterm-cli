name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # build/check-only dry run; never publishes (publish is gated to tags)

permissions:
  id-token: write # OIDC trusted publishing (no token) + provenance attestation
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/finterm-cli
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v6
        with:
          # OIDC trusted publishing requires Node >= 22.14.0 and npm >= 11.5.1.
          node-version: '22.18.0'
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Use an npm that supports trusted publishing
        # Pinned, not @latest: OIDC trusted publishing needs npm >= 11.5.1, and this job
        # holds id-token: write, so it must not pull an unpinned global. Bump deliberately.
        run: npm install -g npm@11.5.1
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}
      - name: Run full check suite
        run: pnpm run ci
        working-directory: ${{ github.workspace }}
      - name: Verify package version matches the release tag
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          test "$TAG" = "$PKG" || {
            echo "::error::release tag v$TAG does not match packages/finterm-cli/package.json version $PKG"
            exit 1
          }
      - name: Guard against a dirty build version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "Publishing finterm version: $version"
          case "$version" in
            *-dirty*)
              echo "::error::Refusing to publish a dirty build version ($version)."
              exit 1
              ;;
          esac
      - name: Verify the production API serves the surfaces this CLI calls
        # The CLI is released only after its server endpoints are live: a tag
        # must not publish an irreversible npm version whose commands 404 in
        # production. The public OpenAPI document is the deploy readback.
        if: github.ref_type == 'tag'
        run: |
          spec="$(curl -sSf https://api.finterm.ai/api/v1/openapi.json)"
          for path in "/api/v1/feedback" "/api/v1/account"; do
            echo "$spec" | node -e '
              const path = process.argv[1];
              let data = "";
              process.stdin.on("data", (c) => (data += c));
              process.stdin.on("end", () => {
                const spec = JSON.parse(data);
                if (!spec.paths || !spec.paths[path]) {
                  console.error(`::error::production OpenAPI is missing ${path}; deploy the API before releasing.`);
                  process.exit(1);
                }
                console.log(`production API serves ${path}`);
              });
            ' "$path"
          done
      - name: Publish to npm (trusted publishing, OIDC)
        # Only a pushed tag publishes; workflow_dispatch runs the steps above as a dry run.
        # No NODE_AUTH_TOKEN: authentication is the OIDC id-token above, configured as a
        # trusted publisher on npmjs.com (see docs/RELEASING.md). --provenance attaches a
        # build attestation. Requires the package to already exist with a trusted publisher
        # configured; the first version is published manually (the one-time bootstrap).
        if: github.ref_type == 'tag'
        run: npm publish --access public --provenance
