name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - name: Guard against dirty build version
        run: |
          version="$(node -p "require('./packages/finterm-cli/package.json').version")"
          echo "Publishing finterm version: $version"
          case "$version" in
            *-dirty*)
              echo "::error::Refusing to publish a dirty build version ($version)."
              exit 1
              ;;
          esac
      - name: Publish to npm
        run: pnpm --filter finterm publish --provenance --access public --no-git-checks
